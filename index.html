 <!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Noesantara - Recipe Nenek Moyang Kita</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:#faf6f0;color:#2d2d2d;line-height:1.6}
/* Nav Top */
.pkl-text{width:100%;text-align:center;font-size:.75rem;font-weight:700;letter-spacing:2px;color:#8B0000;padding:4px 0 2px;border-bottom:1px solid #f0e0d0;margin-bottom:4px}
/* Logo di dalam nav */
.logo-area{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.logo{font-size:1.6rem;font-weight:900;color:#8B0000;text-decoration:none;letter-spacing:-1px}
.logo span{color:#D2691E}
.tag-creator{font-size:.7rem;color:#a08060;font-weight:600;background:#f5ede5;padding:2px 10px;border-radius:20px}
/* SPECIAL HEADER (di dalam nav) */
.nav-header{background:linear-gradient(135deg,#ac6464 0%,#D2691E 50%,#FF8C00 100%);color:white;padding:.8rem 1.5rem;border-radius:12px;text-align:center;width:100%;margin-bottom:6px}
.nav-header .tagline{font-size:.8rem;opacity:.9;margin-top:2px}
/* NAV & SEARCH */
.nav-bar{background:#fff;padding:.6rem 1rem .8rem;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(0,0,0,.08);display:flex;flex-wrap:wrap;gap:.5rem;align-items:center;justify-content:center}
.search-box{flex:1;min-width:180px;max-width:360px;position:relative}
.search-box input{width:100%;padding:.6rem 1rem .6rem 2.5rem;border:2px solid #e0d6cc;border-radius:50px;font-size:.9rem;outline:0;transition:border-color .3s;background:#f8f5f1}
.search-box input:focus{border-color:#D2691E}
.search-box::before{content:'\1F50D';position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:.85rem;opacity:.5}
.filter-btn{background:#f8f5f1;border:2px solid #e0d6cc;border-radius:50px;padding:.4rem 1rem;font-size:.8rem;cursor:pointer;transition:all .3s;font-weight:600;color:#5a4a3a}
.filter-btn:hover,.filter-btn.active{background:#D2691E;color:#fff;border-color:#D2691E}
/* RECIPE GRID */
.recipe-grid{max-width:1400px;margin:2rem auto;padding:0 1rem;display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:1.5rem}
.recipe-card{background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.06);transition:transform .3s,box-shadow .3s;cursor:pointer;display:flex;flex-direction:column}
.recipe-card:hover{transform:translateY(-6px);box-shadow:0 12px 35px rgba(0,0,0,.12)}
.recipe-img{width:100%;height:220px;object-fit:cover;display:block;background:#f0e8e0;transition:transform .5s}
.recipe-card:hover .recipe-img{transform:scale(1.05)}
.recipe-img-wrapper{overflow:hidden;position:relative}
.recipe-badge{position:absolute;top:12px;left:12px;background:rgba(139,0,0,.85);color:#fff;padding:4px 12px;border-radius:20px;font-size:.75rem;font-weight:600;backdrop-filter:blur(4px)}
.recipe-time{position:absolute;bottom:12px;right:12px;background:rgba(0,0,0,.65);color:#fff;padding:4px 10px;border-radius:20px;font-size:.75rem;backdrop-filter:blur(4px)}
.recipe-info{padding:1.2rem 1.3rem 1rem;flex:1;display:flex;flex-direction:column}
.recipe-info h3{font-size:1.15rem;color:#5a3a1a;margin-bottom:4px}
.recipe-origin{font-size:.8rem;color:#a08060;font-weight:600;margin-bottom:6px}
.recipe-desc{font-size:.9rem;color:#6a5a4a;margin-bottom:10px;flex:1}
.recipe-meta{display:flex;gap:1rem;font-size:.8rem;color:#8a7a6a;border-top:1px solid #f0e8e0;padding-top:10px}
/* MODAL */
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.7);z-index:200;display:none;justify-content:center;align-items:center;padding:1rem;backdrop-filter:blur(4px);overflow-y:auto}
.modal-overlay.active{display:flex}
.modal-content{background:#faf6f0;border-radius:20px;max-width:800px;width:100%;max-height:90vh;overflow-y:auto;position:relative;animation:modalIn .4s ease}
@keyframes modalIn{from{opacity:0;transform:translateY(40px) scale(.95)}to{opacity:1;transform:translateY(0) scale(1)}}
.modal-close{position:sticky;top:15px;float:right;margin:15px;background:#fff;border:none;width:38px;height:38px;border-radius:50%;font-size:1.2rem;cursor:pointer;box-shadow:0 2px 12px rgba(0,0,0,.15);z-index:10;display:flex;align-items:center;justify-content:center;transition:transform .3s;color:#5a3a1a}
.modal-close:hover{transform:rotate(90deg)}
.modal-img{width:100%;max-height:400px;object-fit:cover;display:block;border-radius:20px 20px 0 0}
.modal-body{padding:1.5rem 2rem 2rem}
.modal-body h2{font-size:1.8rem;color:#5a3a1a;margin-bottom:4px}
.modal-body .origin{color:#a08060;font-weight:600;margin-bottom:1rem}
.modal-body .story{font-size:.95rem;color:#5a4a3a;margin-bottom:1.5rem;font-style:italic;border-left:3px solid #D2691E;padding-left:1rem}
.ingredients-section,.steps-section{margin-bottom:1.5rem}
.ingredients-section h3,.steps-section h3{font-size:1.2rem;color:#8B0000;margin-bottom:.8rem;display:flex;align-items:center;gap:8px}
.ingredients-list{display:grid;grid-template-columns:1fr 1fr;gap:4px;list-style:none}
.ingredients-list li{padding:6px 10px;background:#fff;border-radius:8px;font-size:.9rem;color:#4a3a2a;break-inside:avoid}
.ingredients-list li::before{content:'\2022';color:#D2691E;font-weight:bold;margin-right:8px}
.steps-list{list-style:none;counter-reset:step}
.steps-list li{counter-increment:step;padding:12px 16px;margin-bottom:8px;background:#fff;border-radius:12px;font-size:.9rem;color:#4a3a2a;display:flex;gap:12px;align-items:flex-start}
.steps-list li::before{content:counter(step);background:linear-gradient(135deg,#8B0000,#D2691E);color:#fff;font-weight:700;width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:.8rem}
/* NO RESULT */
.no-result{display:none;text-align:center;padding:4rem 2rem;color:#8a7a6a;grid-column:1/-1}
.no-result.show{display:block}
.no-result span{font-size:3rem;display:block;margin-bottom:1rem}
/* FOOTER */
footer{background:#2d2d2d;color:#aaa;text-align:center;padding:2rem;margin-top:3rem;font-size:.85rem}
footer strong{color:#fff}
/* RESPONSIVE */
@media(max-width:768px){
.recipe-grid{grid-template-columns:1fr}
.modal-body{padding:1rem 1.2rem 1.5rem}
.ingredients-list{grid-template-columns:1fr}
.modal-img{max-height:250px}
.logo{font-size:1.3rem}
}
@media(max-width:480px){
.nav-bar{padding:.5rem}
.search-box input{padding:.5rem 1rem .5rem 2.2rem}
}
/* SCROLLBAR */
::-webkit-scrollbar{width:8px}
::-webkit-scrollbar-track{background:#f0e8e0}
::-webkit-scrollbar-thumb{background:#c0a890;border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:#a08060}
</style>
</head>

const categoryNames = {
  'makanan-pokok':'Makanan Pokok',
  'lauk':'Lauk Pauk',
  'sup':'Berkuah',
  'kudapan':'Kudapan'
};

let currentFilter = 'all';

function filterRecipes() {
  const searchText = document.getElementById('searchInput').value.toLowerCase().trim();
  const grid = document.getElementById('recipeGrid');
  const noResult = document.getElementById('noResult');
  let hasVisible = false;

  const cards = grid.children;
  for (let i = 0; i < cards.length; i++) {
    const card = cards[i];
    const name = card.dataset.name;
    const origin = card.dataset.origin;
    const desc = card.dataset.desc;
    const cat = card.dataset.category;

    const matchesSearch = !searchText ||
      name.includes(searchText) ||
      origin.includes(searchText) ||
      desc.includes(searchText);

    const matchesFilter = currentFilter === 'all' || cat === currentFilter;

    if (matchesSearch && matchesFilter) {
      card.style.display = '';
      hasVisible = true;
    } else {
      card.style.display = 'none';
    }
  }

  noResult.classList.toggle('show', !hasVisible);
}

function setFilter(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filterRecipes();
}

function openModal(id) {
  const r = recipes.find(x => x.id === id);
  if (!r) return;
  document.getElementById('modalImg').src = r.image;
  document.getElementById('modalImg').alt = r.name;
  document.getElementById('modalOverlay').classList.add('active');
  document.body.style.overflow = 'hidden';

  const body = document.getElementById('modalBody');
  const ings = r.ingredients.map(i => `<li>${i}</li>`).join('');
  const steps = r.steps.map(s => `<li>${s}</li>`).join('');

  body.innerHTML = `
    <h2>${r.name}</h2>
    <p class="origin">${r.origin} | \u23f1 ${r.time}</p>
    <p class="story">${r.story}</p>
    <div class="ingredients-section">
      <h3>\u{1F6D2} Bahan-Bahan</h3>
      <ul class="ingredients-list">${ings}</ul>
    </div>
    <div class="steps-section">
      <h3>\u{1F468}\u200D\u{1F373} Cara Memasak</h3>
      <ol class="steps-list">${steps}</ol>
    </div>
  `;
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('active');
  document.body.style.overflow = '';
}

function closeModalOutside(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

(function render() {
  const grid = document.getElementById('recipeGrid');
  recipes.forEach(r => {
    const catName = categoryNames[r.category] || r.category;
    const card = document.createElement('div');
    card.className = 'recipe-card';
    card.dataset.name = r.name.toLowerCase();
    card.dataset.origin = r.origin.toLowerCase();
    card.dataset.desc = r.desc.toLowerCase();
    card.dataset.category = r.category;
    card.onclick = () => openModal(r.id);
    card.innerHTML = `
      <div class="recipe-img-wrapper">
        <img class="recipe-img" src="${r.image}" alt="${r.name}" loading="lazy" onerror="this.style.display='none'">
        <span class="recipe-badge">${catName}</span>
        <span class="recipe-time">\u23f1 ${r.time}</span>
      </div>
      <div class="recipe-info">
        <h3>${r.name}</h3>
        <p class="recipe-origin">${r.origin}</p>
        <p class="recipe-desc">${r.desc}</p>
        <div class="recipe-meta">
          <span>\u{1F37D} ${r.ingredients.length} bahan</span>
          <span>\u{1F468}\u200D\u{1F373} ${r.steps.length} langkah</span>
        </div>
      </div>
    `;
    grid.appendChild(card);
  });
})();
</script>
